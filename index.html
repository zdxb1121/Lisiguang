<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>北京大学李四光中队讲师团课单</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    
    <style>
        :root {
            --pku-red: #8C0000;
            --pku-red-light: #fdf2f2;
        }

        * { box-sizing: border-box; } 

        body {
            font-family: "Source Han Serif SC", "Noto Serif CJK SC", "SimSun", serif;
            background-color: #f8f8f8;
            color: #2c3e50;
            margin: 0;
            padding: 10px;
            line-height: 1.6;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background-color: #fff;
            padding: clamp(15px, 4%, 40px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-top: 8px solid var(--pku-red);
            border-radius: 4px;
        }

        h1 {
            text-align: center;
            color: var(--pku-red);
            font-size: clamp(1.4rem, 5vw, 2.4rem);
            margin-bottom: 10px;
            letter-spacing: 2px;
            font-weight: 700;
        }

        /* 简介区块样式 */
        .intro-section {
            max-width: 850px;
            margin: 0 auto 30px auto;
            padding: 20px;
            background-color: var(--pku-red-light);
            border-left: 5px solid var(--pku-red);
            border-radius: 4px;
        }

        .intro-title {
            color: var(--pku-red);
            font-weight: bold;
            font-size: 1.15rem;
            margin-bottom: 10px;
            display: block;
        }

        .intro-content {
            font-size: 0.95rem;
            color: #444;
            text-align: justify;
            margin: 0;
        }

        /* 加载动画 */
        #loadingStatus {
            text-align: center;
            padding: 12px;
            background: #e3f2fd;
            color: #0d47a1;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }

        #searchInput {
            width: 100%;
            max-width: 600px;
            padding: 12px 20px;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: 30px;
            outline: none;
            transition: all 0.3s;
        }

        #searchInput:focus { border-color: var(--pku-red); box-shadow: 0 0 10px rgba(140,0,0,0.1); }

        .mobile-sorter-wrapper {
            display: none;
            width: 100%;
            max-width: 600px;
        }

        #mobileSorter {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid #ccc;
            background-color: #fff;
        }

        /* 表格样式 */
        .table-wrapper { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        
        th { background-color: var(--pku-red); color: #ffffff; padding: 15px 10px; }
        th.sortable { cursor: pointer; position: relative; }
        th.sortable::after { content: ' ↕'; opacity: 0.6; margin-left: 4px; }

        td { padding: 14px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #fef9f9; }

        .col-title { width: 20%; font-weight: bold; color: var(--pku-red); }
        .col-speaker { width: 10%; text-align: center; }
        .col-desc { width: 46%; text-align: justify; font-size: 0.9rem; }
        .col-target { width: 12%; text-align: center; }
        .col-stat { width: 12%; text-align: center; }

        .tag { padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 500; display: inline-block; }
        .active { background-color: #e8f5e9; color: #2e7d32; }
        .review { background-color: #fff3e0; color: #ef6c00; }
        .away { background-color: #f5f5f5; color: #757575; }
        mark { background-color: #ffeb3b; color: #000; padding: 0 2px; }

        @media screen and (max-width: 850px) {
            .mobile-sorter-wrapper { display: block; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid #eee; margin-bottom: 15px; border-radius: 12px; overflow: hidden; }
            td { border: none; border-bottom: 1px solid #f9f9f9; position: relative; padding: 12px 12px 12px 32% !important; text-align: left !important; width: auto !important; }
            td:before { content: attr(data-label); position: absolute; left: 12px; font-weight: bold; color: var(--pku-red); font-size: 0.85rem; }
            .col-title { background: var(--pku-red-light); }
        }

        #noResult { display: none; text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <h1>李四光中队讲师团课单</h1>

    <div class="intro-section" id="introBox">
        <span class="intro-title">什么是李四光讲师团？</span>
        <div class="intro-content" id="wordContent">正在读取讲师团简介...</div>
    </div>

    <div id="loadingStatus">正在同步数据中...</div>

    <div class="controls">
        <input type="text" id="searchInput" oninput="filterTable()" placeholder="搜索课程、讲师或关键词...">
        
        <div class="mobile-sorter-wrapper">
            <select id="mobileSorter" onchange="handleMobileSort(this.value)">
                <option value="">🕒 默认排序</option>
                <option value="speaker">👤 按讲师名排序</option>
                <option value="target">🎯 按建议受众排序</option>
                <option value="status">🚩 按课程状态排序</option>
            </select>
        </div>
    </div>
    
    <div class="table-wrapper">
        <table id="courseTable">
            <thead>
                <tr>
                    <th>课程名</th>
                    <th class="sortable" onclick="sortTable('speaker', this)">讲师</th>
                    <th>课程简介</th>
                    <th class="sortable" onclick="sortTable('target', this)">建议受众</th>
                    <th class="sortable" onclick="sortTable('status', this)">状态</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
    <div id="noResult">抱歉，没有找到相关课程。</div>
</div>

<script>
    let courses = [];
    const statusMap = {
        active: { text: "已出课", class: "active", order: 1 },
        review: { text: "在审", class: "review", order: 2 },
        away: { text: "讲师离团", class: "away", order: 3 }
    };
    let currentSort = { key: null, asc: true };

    // 核心初始化：读取 Excel 和 Word
    async function init() {
        const loading = document.getElementById('loadingStatus');
        const timestamp = new Date().getTime();

        // 1. 处理 Word 简介
        try {
            const wordRes = await fetch('讲师团简介.docx?t=' + timestamp);
            if (wordRes.ok) {
                const arrayBuffer = await wordRes.arrayBuffer();
                // 仅提取纯文本
                const result = await mammoth.extractRawText({ arrayBuffer: arrayBuffer });
                document.getElementById('wordContent').innerText = result.value;
            } else {
                document.getElementById('wordContent').innerText = "暂无简介内容。";
            }
        } catch (e) {
            document.getElementById('wordContent').innerText = "简介文件读取失败，请检查 '讲师团简介.docx' 是否存在。";
        }

        // 2. 处理 Excel 课单
        try {
            const excelRes = await fetch('讲师团课单.xlsx?t=' + timestamp);
            if (!excelRes.ok) throw new Error();
            const data = await excelRes.arrayBuffer();
            const workbook = XLSX.read(data, { type: 'array' });
            const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

            courses = rawData.map(row => ({
                title: row['课程名'] || "",
                speaker: row['讲师'] || "",
                desc: row['简介'] || "",
                target: row['建议受众'] || "",
                status: parseStatus(row['状态'])
            }));
            loading.style.display = 'none';
            renderTable();
        } catch (error) {
            loading.innerHTML = "❌ 课单读取失败，请确保目录下有名为 '讲师团课单.xlsx' 的文件。";
        }
    }

    // --- 以下逻辑保持不变 ---
    function parseStatus(t) {
        if (!t) return "active";
        if (t.includes("已出课")) return "active";
        if (t.includes("在审")) return "review";
        if (t.includes("离团")) return "away";
        return "active";
    }

    function renderTable(keyword = "") {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        const filter = keyword.trim().toLowerCase();
        let found = 0;
        courses.forEach(item => {
            const isMatch = !filter || item.title.toLowerCase().includes(filter) || item.speaker.toLowerCase().includes(filter) || item.desc.toLowerCase().includes(filter) || item.target.toLowerCase().includes(filter);
            if (isMatch) {
                found++;
                const row = document.createElement('tr');
                const highlight = (t) => {
                    if (!filter || !t) return t;
                    const reg = new RegExp(`(${filter.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, "gi");
                    return String(t).replace(reg, '<mark>$1</mark>');
                };
                row.innerHTML = `<td class="col-title" data-label="课程名">${highlight(item.title)}</td><td class="col-speaker" data-label="讲师">${highlight(item.speaker)}</td><td class="col-desc" data-label="简介">${highlight(item.desc)}</td><td class="col-target" data-label="建议受众">${highlight(item.target)}</td><td class="col-stat" data-label="状态"><span class="tag ${statusMap[item.status].class}">${statusMap[item.status].text}</span></td>`;
                tbody.appendChild(row);
            }
        });
        document.getElementById("noResult").style.display = (found === 0) ? "block" : "none";
    }

    function handleMobileSort(v) { if(v) sortTable(v, {classList:{add:()=>{},remove:()=>{},contains:()=>false}}); }
    function sortTable(k, el) {
        if(currentSort.key===k){currentSort.asc=!currentSort.asc;}else{currentSort.key=k;currentSort.asc=true;}
        document.querySelectorAll('th.sortable').forEach(e=>e.className='sortable');
        if(el.classList)el.classList.add(currentSort.asc?'sort-asc':'sort-desc');
        courses.sort((a,b)=>{
            let vA=(k==='status')?statusMap[a[k]].order:a[k], vB=(k==='status')?statusMap[b[k]].order:b[k];
            return currentSort.asc?(vA>vB?1:-1):(vA<vB?1:-1);
        });
        renderTable(document.getElementById("searchInput").value);
    }
    function filterTable(){renderTable(document.getElementById("searchInput").value);}

    init();
</script>
</body>
</html>
